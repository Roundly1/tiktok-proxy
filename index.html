<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; }
    #toolbar { width: 100%; background: #111; padding: 10px; display: flex; gap: 8px; align-items: center; }
    #toolbar button { background: #fe2c55; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #toolbar button:hover { background: #d4002f; }
    #url-bar { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
    #screen-wrap { position: relative; width: 100%; flex: 1; overflow: hidden; cursor: crosshair; }
    #screen { width: 100%; height: 100%; object-fit: contain; display: block; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; color: #888; }
    #type-bar { width: 100%; background: #111; padding: 8px; display: flex; gap: 6px; }
    #type-input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 6px; }
    #type-input::placeholder { color: #666; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="openTiktok()">🎵 TikTok</button>
  <button onclick="refresh()">🔄 Refresh</button>
  <button onclick="scrollUp()">⬆️</button>
  <button onclick="scrollDown()">⬇️</button>
  <input id="url-bar" readonly placeholder="URL..."/>
</div>

<div id="screen-wrap">
  <img id="screen" src="" alt="screen" />
  <div id="loading">Yuklanmoqda...</div>
</div>

<div id="type-bar">
  <input id="type-input" placeholder="Matn yozing va Enter bosing..." />
  <button onclick="sendText()">⌨️ Yuborish</button>
</div>

<script>
  // ⚠️ O'zingizning Render URL ingizni yozing!
  const SERVER = "https://tiktok-proxy-nf4h.onrender.com/";

  const img = document.getElementById("screen");
  const loading = document.getElementById("loading");
  const urlBar = document.getElementById("url-bar");

  async function takeScreenshot() {
    loading.style.display = "block";
    img.src = SERVER + "/screenshot?" + Date.now();
    img.onload = () => { loading.style.display = "none"; };
    const r = await fetch(SERVER + "/url");
    const d = await r.json();
    urlBar.value = d.url;
  }

  async function openTiktok() {
    loading.style.display = "block";
    await fetch(SERVER + "/open-tiktok");
    await takeScreenshot();
  }

  async function refresh() {
    await takeScreenshot();
  }

  async function scrollDown() {
    const r = await fetch(SERVER + "/scroll", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deltaY: 600 })
    });
    const blob = await r.blob();
    img.src = URL.createObjectURL(blob);
    loading.style.display = "none";
  }

  async function scrollUp() {
    const r = await fetch(SERVER + "/scroll", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deltaY: -600 })
    });
    const blob = await r.blob();
    img.src = URL.createObjectURL(blob);
    loading.style.display = "none";
  }

  // Click on screen → server ga yuborish
  document.getElementById("screen-wrap").addEventListener("click", async (e) => {
    const wrap = e.currentTarget;
    const rect = wrap.getBoundingClientRect();
    const scaleX = 1280 / rect.width;
    const scaleY = 800 / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    loading.style.display = "block";
    const r = await fetch(SERVER + "/click", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ x, y })
    });
    const blob = await r.blob();
    img.src = URL.createObjectURL(blob);
    loading.style.display = "none";

    const ur = await fetch(SERVER + "/url");
    const d = await ur.json();
    urlBar.value = d.url;
  });

  // Keyboard input
  async function sendText() {
    const input = document.getElementById("type-input");
    const text = input.value;
    if (!text) return;
    input.value = "";
    const r = await fetch(SERVER + "/scroll", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deltaY: 0 })
    });
    await fetch(SERVER + "/type", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });
    await takeScreenshot();
  }

  document.getElementById("type-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendText();
  });

  // Sahifa ochilganda screenshot
  takeScreenshot();
</script>
</body>
</html>
